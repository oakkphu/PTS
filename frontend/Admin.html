<style>
  input[type="password"]::-ms-reveal,
  input[type="password"]::-ms-clear { display: none !important; width: 0 !important; height: 0 !important; }
  body{font-family:'IBM Plex Sans Thai',sans-serif}
  .admin-side__label {
    margin: 0 10px 12px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--pts-primary, #974258);
  }
  .admin-side__nav {
    display: flex;
    flex-direction: column;
    flex-wrap: nowrap;
    gap: 6px;
  }
  .tab-btn {
    display: block;
    width: 100%;
    box-sizing: border-box;
    border: 1px solid var(--pts-border, rgba(151,66,88,.18));
    background: var(--pts-surface, #fff);
    color: var(--pts-text, #1c1520);
    border-radius: 12px;
    padding: 11px 14px;
    font-size: 14px;
    font-weight: 700;
    text-align: left;
    cursor: pointer;
  }
  .tab-btn.active { background: #974258; color: #fff; border-color: #974258; }
  html[data-theme="dark"] .tab-btn.active { background: #b85a70; border-color: #b85a70; }

  /* —— Banner admin (easy add + color picker) —— */
  .ban-wrap { display:grid; gap:18px; }
  .ban-card {
    background: var(--pts-surface, #fff);
    border: 1px solid var(--pts-border, rgba(151,66,88,.14));
    border-radius: 20px;
    padding: 18px 16px;
    box-shadow: var(--pts-shadow-sm, 0 8px 24px rgba(28,21,32,.05));
  }
  .ban-steps {
    display:flex; flex-wrap:wrap; gap:8px; margin:0 0 14px;
    font-size:12px; font-weight:700; color:var(--pts-muted,#5c4f55);
  }
  .ban-steps span {
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 10px; border-radius:999px;
    background:var(--pts-primary-soft,#f6e6ea); color:var(--pts-primary,#974258);
  }
  .ban-theme-grid {
    display:grid; grid-template-columns:repeat(auto-fit,minmax(88px,1fr)); gap:10px;
  }
  .ban-theme {
    appearance:none; border:2px solid transparent; border-radius:14px;
    padding:0; cursor:pointer; overflow:hidden; text-align:left;
    background:#fff; box-shadow:0 4px 14px rgba(0,0,0,.08);
    transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
  }
  .ban-theme:hover { transform:translateY(-2px); }
  .ban-theme.is-active {
    border-color:#974258;
    box-shadow:0 0 0 3px rgba(151,66,88,.2), 0 8px 20px rgba(0,0,0,.12);
  }
  .ban-theme__swatch { display:block; height:44px; width:100%; }
  .ban-theme__label {
    display:block; padding:7px 8px 8px; font-size:11px; font-weight:700;
    color:var(--pts-text,#1c1520); line-height:1.2;
  }
  .ban-theme[data-theme="rose"] .ban-theme__swatch {
    background: linear-gradient(135deg,#5c2436,#8a3550 45%,#ffb1c1);
  }
  .ban-theme[data-theme="sage"] .ban-theme__swatch {
    background: linear-gradient(135deg,#1f3d2e,#3d5a4c 45%,#85be96);
  }
  .ban-theme[data-theme="gold"] .ban-theme__swatch {
    background: linear-gradient(135deg,#5c3a18,#a67b32 45%,#e8c478);
  }
  .ban-theme[data-theme="ink"] .ban-theme__swatch {
    background: linear-gradient(135deg,#0c1016,#2c3a48 45%,#8c9cb4);
  }
  .ban-theme[data-theme="ocean"] .ban-theme__swatch {
    background: linear-gradient(135deg,#0e1e24,#2a6a72 45%,#64bec8);
  }
  .ban-theme[data-theme="sunset"] .ban-theme__swatch {
    background: linear-gradient(135deg,#6e2e28,#c45a3a 45%,#ffc08c);
  }
  .ban-theme[data-theme="custom"] .ban-theme__swatch {
    background:
      conic-gradient(from 90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #1dd1a1, #ff6b6b);
  }
  .ban-preview[data-theme="custom"] {
    background: linear-gradient(135deg, #1a1216, var(--ban-c, #974258) 48%, #2a1a22);
  }
  .ban-rgb {
    display:grid; gap:12px; margin-top:12px; padding:14px;
    border:1px solid var(--pts-border,rgba(151,66,88,.16));
    border-radius:14px; background:rgba(151,66,88,.04);
  }
  .ban-rgb.is-hidden { display:none; }
  .ban-rgb__row { display:flex; flex-wrap:wrap; gap:10px; align-items:end; }
  .ban-rgb__row .ban-field { flex:1 1 72px; min-width:72px; }
  .ban-rgb__picker {
    width:52px; height:40px; padding:0; border:0; border-radius:10px;
    background:transparent; cursor:pointer;
  }
  .ban-wheel-layout {
    display:grid; gap:14px; align-items:center;
  }
  @media (min-width:640px) {
    .ban-wheel-layout { grid-template-columns: auto minmax(0,1fr); }
  }
  .ban-wheel-stage {
    position:relative; width:220px; height:220px; margin:0 auto;
    touch-action:none; user-select:none;
  }
  .ban-wheel-stage canvas {
    display:block; width:220px; height:220px; border-radius:50%;
    box-shadow:0 10px 28px rgba(0,0,0,.18), inset 0 0 0 1px rgba(255,255,255,.35);
    cursor:crosshair;
  }
  .ban-wheel-marker {
    position:absolute; width:18px; height:18px; margin:-9px 0 0 -9px;
    border:2px solid #fff; border-radius:999px;
    box-shadow:0 0 0 1px rgba(0,0,0,.35), 0 4px 10px rgba(0,0,0,.25);
    pointer-events:none; left:50%; top:50%;
  }
  .ban-wheel-side { display:grid; gap:10px; }
  .ban-wheel-swatch {
    width:100%; height:48px; border-radius:12px;
    border:1px solid rgba(0,0,0,.12);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.35);
  }
  .ban-wheel-side label { font-size:12px; font-weight:700; color:var(--pts-muted,#5c4f55); }
  .ban-wheel-side input[type="range"] { width:100%; accent-color:#974258; }
  .ban-mini-themes button[data-theme="custom"] {
    background: conic-gradient(from 90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #1dd1a1, #ff6b6b);
  }
  .ban-drop {
    border:2px dashed rgba(151,66,88,.35);
    border-radius:16px; padding:18px; text-align:center;
    background:rgba(151,66,88,.04); cursor:pointer;
    transition: border-color .15s ease, background .15s ease;
  }
  .ban-drop.is-drag { border-color:#974258; background:rgba(151,66,88,.1); }
  .ban-drop__hint { margin:0; font-size:13px; color:var(--pts-muted,#5c4f55); }
  .ban-drop__hint strong { color:var(--pts-primary,#974258); }
  .ban-preview {
    border-radius:18px; padding:18px; min-height:160px; color:#fff;
    display:grid; gap:14px; align-items:center;
    background: linear-gradient(135deg,#5c2436,#8a3550 45%,#3d5a4c);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.2), 0 16px 36px rgba(0,0,0,.18);
  }
  @media (min-width:720px) {
    .ban-preview { grid-template-columns: 1.2fr .8fr; }
  }
  .ban-preview[data-theme="rose"] { background: linear-gradient(135deg,#5c2436,#8a3550 45%,#ffb1c1); }
  .ban-preview[data-theme="sage"] { background: linear-gradient(135deg,#1f3d2e,#3d5a4c 50%,#85be96); }
  .ban-preview[data-theme="gold"] { background: linear-gradient(135deg,#5c3a18,#a67b32 50%,#e8c478); }
  .ban-preview[data-theme="ink"] { background: linear-gradient(135deg,#0c1016,#2c3a48 50%,#8c9cb4); }
  .ban-preview[data-theme="ocean"] { background: linear-gradient(135deg,#0e1e24,#2a6a72 50%,#64bec8); }
  .ban-preview[data-theme="sunset"] { background: linear-gradient(135deg,#6e2e28,#c45a3a 50%,#ffc08c); }
  .ban-preview__eyebrow {
    display:inline-flex; padding:4px 10px; border-radius:999px; margin:0 0 8px;
    background:rgba(255,255,255,.18); font-size:11px; font-weight:700;
  }
  .ban-preview__title { margin:0 0 6px; font-size:1.25rem; font-weight:800; line-height:1.25; }
  .ban-preview__title em { font-style:normal; color:#ffd0da; }
  .ban-preview__lead { margin:0; font-size:13px; opacity:.88; line-height:1.45; }
  .ban-preview__img {
    width:100%; aspect-ratio:4/5; max-height:180px; object-fit:cover; object-position:center 14%;
    border-radius:14px; background:rgba(255,255,255,.15); display:block;
  }
  .ban-field { display:grid; gap:6px; }
  .ban-field label { font-size:12px; font-weight:700; color:var(--pts-muted,#5c4f55); }
  .ban-field input, .ban-field textarea, .ban-field select {
    width:100%; border:1px solid var(--pts-border,rgba(151,66,88,.18));
    border-radius:12px; padding:10px 12px; font:inherit; background:var(--pts-surface,#fff);
    color:var(--pts-text,#1c1520);
  }
  .ban-grid { display:grid; gap:12px; }
  @media (min-width:720px) {
    .ban-grid-2 { grid-template-columns:1fr 1fr; }
  }
  .ban-adv {
    border:1px solid var(--pts-border,rgba(151,66,88,.14));
    border-radius:14px; padding:10px 12px; background:rgba(151,66,88,.03);
  }
  .ban-adv summary {
    cursor:pointer; font-weight:700; font-size:14px; color:var(--pts-primary,#974258);
    list-style:none;
  }
  .ban-adv summary::-webkit-details-marker { display:none; }
  .ban-adv[open] summary { margin-bottom:12px; }
  .ban-list-item {
    display:grid; gap:12px; align-items:center;
    border:1px solid var(--pts-border,rgba(151,66,88,.14));
    border-radius:16px; padding:12px; background:var(--pts-surface,#fff);
  }
  @media (min-width:800px) {
    .ban-list-item { grid-template-columns: 120px minmax(0,1fr) auto; }
  }
  .ban-list-item.is-hidden { opacity:.55; }
  .ban-mini-themes { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .ban-mini-themes button {
    width:22px; height:22px; border-radius:999px; border:2px solid #fff;
    box-shadow:0 0 0 1px rgba(0,0,0,.15); cursor:pointer; padding:0;
  }
  .ban-mini-themes button.is-active { box-shadow:0 0 0 2px #974258; transform:scale(1.12); }
  .ban-mini-themes button[data-theme="rose"] { background:linear-gradient(135deg,#8a3550,#ffb1c1); }
  .ban-mini-themes button[data-theme="sage"] { background:linear-gradient(135deg,#3d5a4c,#85be96); }
  .ban-mini-themes button[data-theme="gold"] { background:linear-gradient(135deg,#a67b32,#e8c478); }
  .ban-mini-themes button[data-theme="ink"] { background:linear-gradient(135deg,#2c3a48,#8c9cb4); }
  .ban-mini-themes button[data-theme="ocean"] { background:linear-gradient(135deg,#2a6a72,#64bec8); }
  .ban-mini-themes button[data-theme="sunset"] { background:linear-gradient(135deg,#c45a3a,#ffc08c); }
</style>

<script>
const escapeHtml = (t) => String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
let coursesCache = [];

async function api(url, options = {}) {
  const res = await fetch(url, { credentials: 'include', headers: { 'Content-Type': 'application/json' }, ...options });
  const data = await res.json().catch(() => ({}));
  if (res.status === 401) { location.href = 'Login.html'; throw new Error('unauthorized'); }
  if (res.status === 403) { console.error(data.message || 'ไม่มีสิทธิ์แอดมิน'); location.href = 'Home.html'; throw new Error('forbidden'); }
  if (!res.ok || data.success === false) throw new Error(data.message || 'คำขอล้มเหลว');
  return data;
}

async function renderCourses() {
  const { data } = await api('/api/admin/courses');
  coursesCache = data;
  document.getElementById('panel').innerHTML = `
    <h2 class="font-bold text-lg mb-3">สร้างหลักสูตรใหม่</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
      <input id="c-name" class="border rounded-xl px-3 py-2" placeholder="ชื่อหลักสูตร">
      <input id="c-instructor" class="border rounded-xl px-3 py-2" placeholder="วิทยากร">
      <select id="c-mode" class="border rounded-xl px-3 py-2"><option value="online">online</option><option value="onsite">onsite</option><option value="hybrid">hybrid</option></select>
      <input id="c-hours" type="number" class="border rounded-xl px-3 py-2" placeholder="ชั่วโมง" value="4">
      <input id="c-cover" class="border rounded-xl px-3 py-2 md:col-span-2" placeholder="URL รูปปก">
    </div>
    <button id="create-course" class="bg-primary text-white px-5 py-2 rounded-full font-bold mb-6">สร้างหลักสูตร</button>
    <div class="space-y-2">${data.map(c => `
      <div class="border rounded-xl p-3 flex justify-between gap-3 items-start">
        <div>
          <p class="font-bold">${escapeHtml(c.course_name)}</p>
          <p class="text-sm text-on-surface-variant">#${c.course_id} · ${escapeHtml(c.delivery_mode)} · ${escapeHtml(c.instructor_name || '-')}</p>
        </div>
        <button class="text-sm text-primary font-bold feature-btn" data-id="${c.course_id}" data-featured="${c.is_featured ? 0 : 1}">${c.is_featured ? 'เลิกแนะนำ' : 'ตั้งแนะนำ'}</button>
      </div>`).join('') || '<p>ยังไม่มีหลักสูตร</p>'}
    </div>`;

  document.getElementById('create-course').onclick = async () => {
    await api('/api/admin/courses', {
      method: 'POST',
      body: JSON.stringify({
        course_name: document.getElementById('c-name').value,
        instructor_name: document.getElementById('c-instructor').value,
        delivery_mode: document.getElementById('c-mode').value,
        total_hours: Number(document.getElementById('c-hours').value || 1),
        cover_image_url: document.getElementById('c-cover').value,
        is_featured: false
      })
    });
    await renderCourses();
  };

  document.querySelectorAll('.feature-btn').forEach(btn => {
    btn.onclick = async () => {
      await api(`/api/admin/courses/${btn.dataset.id}`, {
        method: 'PUT',
        body: JSON.stringify({ is_featured: btn.dataset.featured === '1' })
      });
      renderCourses();
    };
  });
}

async function renderLessons() {
  if (!coursesCache.length) {
    const { data } = await api('/api/admin/courses');
    coursesCache = data;
  }
  document.getElementById('panel').innerHTML = `
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
      <select id="l-course" class="border rounded-xl px-3 py-2">${coursesCache.map(c => `<option value="${c.course_id}">${escapeHtml(c.course_name)}</option>`).join('')}</select>
      <input id="l-title" class="border rounded-xl px-3 py-2" placeholder="ชื่อบทเรียน">
      <input id="l-video" class="border rounded-xl px-3 py-2 md:col-span-2" placeholder="Video embed URL (เช่น YouTube embed)">
      <textarea id="l-content" class="border rounded-xl px-3 py-2 md:col-span-2" rows="4" placeholder="เนื้อหา HTML/ข้อความ"></textarea>
      <input id="l-sort" type="number" class="border rounded-xl px-3 py-2" value="1" placeholder="ลำดับ">
      <input id="l-duration" type="number" class="border rounded-xl px-3 py-2" value="15" placeholder="นาที">
    </div>
    <button id="add-lesson" class="bg-primary text-white px-5 py-2 rounded-full font-bold mb-4">เพิ่มบทเรียน</button>
    <div id="lesson-admin-list" class="space-y-2 text-sm text-on-surface-variant">เลือกหลักสูตรแล้วกดโหลด...</div>
  `;

  const loadLessons = async () => {
    const courseId = document.getElementById('l-course').value;
    const { data } = await api(`/api/admin/courses/${courseId}/lessons`);
    document.getElementById('lesson-admin-list').innerHTML = data.map(l => `
      <div class="border rounded-xl p-3 flex justify-between gap-2 ${l.flag_use ? '' : 'opacity-50'}">
        <div><p class="font-bold">${escapeHtml(l.title)}</p><p class="text-xs">#${l.lesson_id} · ลำดับ ${l.sort_order} · ${l.duration_minutes} นาที</p></div>
        ${l.flag_use ? `<button class="del-lesson text-red-600 font-bold" data-id="${l.lesson_id}">ปิดใช้</button>` : '<span>ปิดแล้ว</span>'}
      </div>`).join('') || '<p>ยังไม่มีบทเรียน</p>';
    document.querySelectorAll('.del-lesson').forEach(btn => {
      btn.onclick = async () => { await api(`/api/admin/lessons/${btn.dataset.id}`, { method: 'DELETE' }); loadLessons(); };
    });
  };

  document.getElementById('l-course').onchange = loadLessons;
  document.getElementById('add-lesson').onclick = async () => {
    const courseId = document.getElementById('l-course').value;
    await api(`/api/admin/courses/${courseId}/lessons`, {
      method: 'POST',
      body: JSON.stringify({
        title: document.getElementById('l-title').value,
        content_html: document.getElementById('l-content').value,
        video_url: document.getElementById('l-video').value,
        sort_order: Number(document.getElementById('l-sort').value || 1),
        duration_minutes: Number(document.getElementById('l-duration').value || 15)
      })
    });
    loadLessons();
  };
  if (coursesCache.length) loadLessons();
}

async function renderSchedules() {
  if (!coursesCache.length) {
    const { data } = await api('/api/admin/courses');
    coursesCache = data;
  }
  const { data } = await api('/api/admin/schedules');
  const now = new Date();
  const start = new Date(now.getTime() + 86400000); start.setMinutes(0,0,0);
  const end = new Date(start.getTime() + 2*3600000);
  const toLocalInput = (d) => {
    const pad = (n) => String(n).padStart(2, '0');

      <label class="text-sm font-semibold text-on-surface-variant">วันเวลาจบ
        <input id="s-end" type="datetime-local" class="mt-1 w-full border rounded-xl px-3 py-2" value="${toLocalInput(end)}">
      </label>
      <label class="text-sm font-semibold text-on-surface-variant">สถานที่
        <input id="s-location" class="mt-1 w-full border rounded-xl px-3 py-2" placeholder="สถานที่ (onsite)">

      <label class="text-sm font-semibold text-on-surface-variant">Meeting URL

    <div class="space-y-2">${data.map(s => `
      <div class="border rounded-xl p-3 flex justify-between gap-2">
        <div>
          <p class="font-bold">${escapeHtml(s.title)}</p>
          <p class="text-sm text-on-surface-variant">${escapeHtml(s.course_name || '-')} · ${new Date(s.start_at).toLocaleString('th-TH')} – ${new Date(s.end_at).toLocaleString('th-TH')}</p>
        </div>
        <button class="del-schedule text-red-600 font-bold" data-id="${s.schedule_id}">ลบ</button>

  document.getElementById('add-schedule').onclick = async () => {

    const showErr = (t) => { formMsg.textContent = t; formMsg.className = 'pts-msg pts-msg--err mb-4'; };
    const title = document.getElementById('s-title').value.trim();
    const courseId = document.getElementById('s-course').value;
    if (!title) return showErr('กรุณาใส่หัวข้อคลาส');
    if (!courseId) return showErr('กรุณาเลือกหลักสูตรที่ผูกตาราง (จำเป็นสำหรับซิงค์ Google Calendar)');

    formMsg.className = 'pts-msg mb-4';

      await api('/api/admin/schedules', {

async function renderBanners() {
  const { data } = await api('/api/admin/home-banners');
  const list = Array.isArray(data) ? data : [];

  document.getElementById('panel').innerHTML = `
    <div class="space-y-4">
      <div class="pts-card p-5">
        <h2 class="font-bold text-lg mb-1">เพิ่มแบนเนอร์หน้าแรก</h2>
        <p class="text-sm text-on-surface-variant mb-4">
          อัปโหลดรูปแล้วจะโชว์บนหน้าแรกทันที · สร้างรูป <strong>1920 × 1080 px</strong> (อัตราส่วน 16:9) — พอดีกรอบแบนเนอร์หน้าแรก
          · เก็บไฟล์ที่ <code>uploads/hero/</code>
        </p>
        <input type="file" id="banner-file" accept="image/png,image/jpeg,image/webp,image/gif" class="block w-full text-sm mb-2">
        <button type="button" class="pts-btn pts-btn-primary" id="banner-upload">เพิ่มแบนเนอร์</button>
        <p id="banner-msg" class="text-xs mt-2 text-on-surface-variant"></p>
      </div>

      <div class="pts-card p-5">
        <h3 class="font-bold mb-3">รายการแบนเนอร์ (${list.length})</h3>
        ${list.length ? `
          <div class="grid gap-3 md:grid-cols-2">
            ${list.map((b, i) => `
              <article class="rounded-2xl border border-[var(--pts-border,rgba(151,66,88,.14))] overflow-hidden bg-[var(--pts-surface,#fff)]">
                <div class="bg-[#0b1020]">
                  <img src="${escapeHtml(b.url)}" alt="" class="w-full h-40 object-cover"
                    onerror="this.onerror=null;this.src='/uploads/hero/home-banner.png'">
                </div>
                <div class="p-3 flex items-center justify-between gap-2">
                  <div class="min-w-0">
                    <p class="text-xs text-on-surface-variant">ลำดับสไลด์ ${i + 1}</p>
                    <p class="text-sm font-bold truncate"><code>${escapeHtml(b.filename || b.id)}</code></p>
                  </div>
                  <button type="button" class="pts-btn pts-btn-outline text-red-600 banner-del" data-file="${escapeHtml(b.filename || b.id)}">ลบ</button>
                </div>
              </article>
            `).join('')}
          </div>
        ` : `<div class="pts-empty">ยังไม่มีแบนเนอร์ — อัปโหลดรูปด้านบนได้เลย</div>`}
        <p class="text-xs text-on-surface-variant mt-3">
          <a class="text-primary font-bold" href="Home.html" target="_blank" rel="noopener">เปิดหน้าแรก</a> เพื่อดูสไลด์แบนเนอร์
        </p>
      </div>
    </div>`;

  document.getElementById('banner-upload')?.addEventListener('click', async () => {
    const input = document.getElementById('banner-file');
    const msg = document.getElementById('banner-msg');
    const file = input?.files?.[0];
    if (!file) {
      if (msg) msg.textContent = 'กรุณาเลือกไฟล์ก่อน';
      return;
    }
    if (msg) msg.textContent = 'กำลังอัปโหลด...';
    try {
      const fd = new FormData();
      fd.append('image', file);
      const res = await fetch('/api/admin/home-banners/upload', {
        method: 'POST',
        credentials: 'include',
        body: fd
      });
      const json = await res.json().catch(() => ({}));
      if (!res.ok || json.success === false) throw new Error(json.message || 'อัปโหลดไม่สำเร็จ');
      if (msg) msg.textContent = 'เพิ่มแบนเนอร์แล้ว ✓';
      renderBanners();
    } catch (e) {
      if (msg) msg.textContent = e.message || 'อัปโหลดไม่สำเร็จ';
    }
  });

  document.querySelectorAll('.banner-del').forEach((btn) => {
    btn.onclick = async () => {
      const filename = btn.dataset.file;
      if (!filename) return;
      if (!confirm(`ลบแบนเนอร์ ${filename} ?`)) return;
      try {
        await api(`/api/admin/home-banners/${encodeURIComponent(filename)}`, { method: 'DELETE' });
        renderBanners();
      } catch (e) {
        alert(e.message || 'ลบไม่สำเร็จ');
      }
    };
  });
}

            <p class="text-xs text-on-surface-variant mb-2">ไฟล์: <code>${escapeHtml(stamp.filename || 'stamp.png')}</code></p>
            <input type="file" id="cert-stamp-file" accept="image/png,image/jpeg,image/webp,image/gif" class="block w-full text-sm mb-2">
            <button type="button" class="pts-btn pts-btn-primary" id="cert-stamp-upload">อัปโหลดสแตมป์</button>
            <p id="cert-stamp-msg" class="text-xs mt-2 text-on-surface-variant"></p>
          </div>
        </div>
      </div>
    </div>`;

  const uploadSlot = async (slot, fileInputId, msgId, previewId) => {
    const input = document.getElementById(fileInputId);
    const msg = document.getElementById(msgId);
    const file = input?.files?.[0];
    if (!file) {
      if (msg) msg.textContent = 'กรุณาเลือกไฟล์ก่อน';
      return;
    }
    if (msg) msg.textContent = 'กำลังอัปโหลด...';
    try {
      const fd = new FormData();
      fd.append('slot', slot);
      fd.append('image', file);
      const res = await fetch(`/api/admin/cert-assets/upload?slot=${encodeURIComponent(slot)}`, {
        method: 'POST',
        credentials: 'include',
        body: fd
      });
      const json = await res.json().catch(() => ({}));
      if (!res.ok || json.success === false) throw new Error(json.message || 'อัปโหลดไม่สำเร็จ');
      const preview = document.getElementById(previewId);
      if (preview && json.url) preview.src = json.url;
      if (msg) msg.textContent = 'อัปโหลดแล้ว ✓ — เปิดหน้า Certificates เพื่อดูผล';
    } catch (e) {
      if (msg) msg.textContent = e.message || 'อัปโหลดไม่สำเร็จ';
    }
  };

  document.getElementById('cert-logo-upload')?.addEventListener('click', () => {
    uploadSlot('logo', 'cert-logo-file', 'cert-logo-msg', 'cert-logo-preview');
  });
  document.getElementById('cert-stamp-upload')?.addEventListener('click', () => {
    uploadSlot('stamp', 'cert-stamp-file', 'cert-stamp-msg', 'cert-stamp-preview');
  });
}

const tabs = {
  courses: renderCourses,
  lessons: renderLessons,
  schedules: renderSchedules,
  banners: renderBanners,
  cert: renderCertAssets,
  users: renderUsers,
  posts: renderPosts,
  payments: renderPayments,
  mail: renderMail
};

function activateTab(name) {
  const key = tabs[name] ? name : 'courses';
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === key);
  });
  tabs[key]();
  if (location.hash !== '#' + key) {
    history.replaceState(null, '', '#' + key);
  }
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.onclick = () => activateTab(btn.dataset.tab);
});

window.addEventListener('hashchange', () => {
  activateTab((location.hash || '').replace(/^#/, ''));
});

(async () => {
  const me = await fetch('/api/users/me', { credentials: 'include' }).then(r => r.json());
  if (!me.loggedIn) return location.href = 'Login.html';
  if ((me.user.role || '').toLowerCase() !== 'admin') {
    return location.href = 'Home.html';
  }
  activateTab((location.hash || '').replace(/^#/, '') || 'courses');
})().catch(err => console.error(err));
</script>
