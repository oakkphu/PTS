<main class="pts-main">
  <section class="pts-page-hero">
    <span class="pts-chip mb-3">Certificates</span>
    <h1 class="text-3xl md:text-4xl font-bold text-primary mb-2 pts-display">ใบประกาศของฉัน</h1>
    <p class="text-on-surface-variant max-w-xl">ออกอัตโนมัติเมื่อเรียนครบทุกบทของคอร์ส</p>
  </section>
  <div id="cert-list" class="grid grid-cols-1 md:grid-cols-2 gap-5">
    <div class="pts-empty col-span-full">กำลังโหลด...</div>
  </div>
</main>
<div class="pts-footer-note">© PTS Learning</div>
<script>
const escapeHtml = (t) => String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
async function load() {
  const me = await fetch('/api/users/me', { credentials: 'include' }).then(r => r.json());
  if (!me.loggedIn) return location.href = 'Login.html';
  const res = await fetch('/api/my/certificates', { credentials: 'include' });
  const data = await res.json();
  const el = document.getElementById('cert-list');
  if (!res.ok || !data.success) {
    el.innerHTML = `<div class="pts-empty col-span-full pts-msg--err">${escapeHtml(data.message || 'โหลดไม่สำเร็จ')}</div>`;
    return;
  }
  if (!data.data.length) {
    el.innerHTML = `<div class="pts-empty col-span-full">
      <div class="pts-empty__icon"><span class="material-symbols-outlined">workspace_premium</span></div>
      <p class="font-semibold mb-1">ยังไม่มีใบประกาศ</p>
      <p class="text-sm mb-4">เรียนให้ครบทุกบทแล้วระบบจะออกใบประกาศให้อัตโนมัติ</p>
      <a class="pts-btn pts-btn-primary" href="Courses.html">ไปเรียนต่อ</a>
    </div>`;
    return;
  }
  el.innerHTML = data.data.map(c => `
    <article class="cert-sheet pts-panel relative overflow-hidden border-2 border-primary/15">
      <div class="absolute -right-8 -top-8 w-28 h-28 rounded-full bg-primary/10 pointer-events-none"></div>
      <p class="text-xs font-bold tracking-[0.18em] text-primary mb-3">PTS CERTIFICATE</p>
      <h2 class="text-xl font-bold pts-display mb-1">${escapeHtml(c.course_name)}</h2>
      <p class="text-sm text-on-surface-variant mb-5">วิทยากร ${escapeHtml(c.instructor_name || '-')}</p>
      <p class="text-sm">มอบให้แก่ <strong>${escapeHtml(me.user.name || '')}</strong></p>
      <p class="text-xs text-on-surface-variant mt-3">รหัส ${escapeHtml(c.certificate_code)}</p>
      <p class="text-xs text-on-surface-variant">วันที่ออก ${new Date(c.issued_at).toLocaleDateString('th-TH')}</p>
      <button onclick="window.print()" class="pts-btn pts-btn-outline mt-5 no-print">พิมพ์ใบประกาศ</button>
    </article>
  `).join('');
}
load().catch(err => {
  document.getElementById('cert-list').innerHTML = `<div class="pts-empty col-span-full pts-msg--err">${escapeHtml(err.message)}</div>`;
});
</script>
