<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ใบประกาศนียบัตร | PTS Learning</title>
<script src="/comp/theme-boot.js"></script>
<link rel="stylesheet" href="site.css?v=20260723t">
<link rel="stylesheet" href="certificates.css?v=20260724h">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&amp;family=Sarabun:wght@300;400;600;700&amp;family=IBM+Plex+Sans+Thai:wght@400;500;600;700&amp;family=Sora:wght@600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
</head>
<body class="pts-body cert-page">
<div id="app-navbar"></div>

<main class="pts-main" data-user-shell>
  <section class="pts-page-hero">
    <span class="pts-chip mb-3">Certificates</span>
    <h1 class="text-3xl md:text-4xl font-bold text-primary mb-2 pts-display">ใบประกาศนียบัตรของคุณ</h1>
    <p class="text-on-surface-variant max-w-2xl">ใบประกาศมาตรฐาน Personal Assistant Academy — ออกอัตโนมัติเมื่อเรียนจบหลักสูตร ฟอร์แมตเดียวกันทุกใบ</p>
  </section>

  <div class="cert-toolbar no-print">
    <div class="cert-search">
      <span class="material-symbols-outlined" aria-hidden="true">search</span>
      <input id="cert-q" type="search" placeholder="ค้นหาตามชื่อหลักสูตร..." autocomplete="off">
    </div>
    <div class="cert-filters" role="tablist" aria-label="ตัวกรองใบประกาศ">
      <button type="button" class="cert-filter is-active" data-filter="all">ทั้งหมด <span class="cert-filter__count" id="count-all">0</span></button>
      <button type="button" class="cert-filter" data-filter="latest">ล่าสุด</button>
      <button type="button" class="cert-filter" data-filter="az">ตามชื่อหลักสูตร</button>
    </div>
  </div>

  <div id="cert-grid" class="cert-grid no-print">
    <div class="pts-empty" style="grid-column:1/-1">กำลังโหลด...</div>
  </div>
</main>

<div class="pts-footer-note no-print">© PTS Learning</div>

<!-- Full certificate viewer / print target -->
<div id="cert-modal" class="cert-modal" aria-hidden="true">
  <div class="cert-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="cert-modal-title">
    <div class="cert-modal__bar no-print">
      <button type="button" class="pts-btn pts-btn-primary" id="cert-print-btn">
        <span class="material-symbols-outlined" style="font-size:18px">download</span>
        ดาวน์โหลด / พิมพ์ PDF
      </button>
      <button type="button" class="pts-btn pts-btn-outline" id="cert-close-btn">ปิด</button>
    </div>
    <h2 id="cert-modal-title" class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">ใบประกาศนียบัตร</h2>
    <div id="cert-print-root"></div>
  </div>
</div>

<script>
/* Prefer uploaded cert images; fall back to bundled assets */
const PA_LOGO = '/uploads/cert/2.png';
const PA_LOGO_FALLBACK = '/assets/2.png';
const PA_STAMP = '/uploads/cert/2_2.png';
const PA_STAMP_FALLBACK = '/assets/2_2.png';
const escapeHtml = (t) => String(t || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
const imgFallback = (fallback) => `this.onerror=null;this.src='${fallback}'`;

let userName = '';
let allCerts = [];
let filterMode = 'all';
let query = '';

function formatCertDate(dateValue) {
  if (!dateValue) return '-';
  const d = new Date(dateValue);
  if (Number.isNaN(d.getTime())) return '-';
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const yyyy = d.getFullYear();
  return `${dd}/${mm}/${yyyy}`;
}

function certCompletionDate(cert) {
  return cert?.completed_at || cert?.issued_at || null;
}

/** Official PA Academy certificate — template with dynamic name / course / date */
function certificateHtml({ userName, courseName, completedAt }) {
  const dateText = formatCertDate(completedAt);
  const name = escapeHtml(userName || 'ผู้เรียน');
  const course = escapeHtml(courseName || '');
  return `
    <article class="pts-cert" aria-label="Certificate of Completion">
      <div class="pts-cert__frame">
        <div class="pts-cert__ornament pts-cert__ornament--tl" aria-hidden="true"></div>
        <div class="pts-cert__ornament pts-cert__ornament--tr" aria-hidden="true"></div>
        <div class="pts-cert__ornament pts-cert__ornament--bl" aria-hidden="true"></div>
        <div class="pts-cert__ornament pts-cert__ornament--br" aria-hidden="true"></div>

        <div class="pts-cert__watermark" aria-hidden="true">PA ACADEMY</div>

        <div class="pts-cert__ribbon" aria-hidden="true"></div>

        <div class="pts-cert__tr-bg" aria-hidden="true"></div>
        <div class="pts-cert__tr-gold" aria-hidden="true"></div>
        <div class="pts-cert__tr" aria-hidden="true"></div>
        <div class="pts-cert__tr-inner" aria-hidden="true"></div>

        <div class="pts-cert__bl-bg" aria-hidden="true"></div>
        <div class="pts-cert__bl-gold" aria-hidden="true"></div>
        <div class="pts-cert__bl" aria-hidden="true"></div>
        <div class="pts-cert__bl-inner" aria-hidden="true"></div>

        <div class="pts-cert__logo-wrap">
          <img class="pts-cert__logo" src="${PA_LOGO}" alt="Logo" decoding="async" onerror="${imgFallback(PA_LOGO_FALLBACK)}">
        </div>

        <div class="pts-cert__content">
          <div class="pts-cert__heading">CERTIFICATE OF COMPLETION</div>
          <div class="pts-cert__divider" aria-hidden="true"></div>
          <div class="pts-cert__presented">PROUDLY PRESENTED TO :</div>
          <div class="pts-cert__recipient">
            <h2 class="pts-cert__name">${name}</h2>
          </div>
          <p class="pts-cert__course">${course}</p>
          <div class="pts-cert__date-wrap">
            <div class="pts-cert__date-label">Date / วันที่เรียนจบ</div>
            <div class="pts-cert__date">${escapeHtml(dateText)}</div>
          </div>
        </div>

        <div class="pts-cert__footer">
          <img class="pts-cert__stamp" src="${PA_STAMP}" alt="Stamp" decoding="async" onerror="${imgFallback(PA_STAMP_FALLBACK)}">
          <div class="pts-cert__sign-line">PA ACADEMY</div>
        </div>
      </div>
    </article>`;
}

function fitCertPreview(root) {
  if (!root) return;
  const cert = root.querySelector('.pts-cert');
  if (!cert) return;
  const isCard = root.parentElement && root.parentElement.classList.contains('cert-card__preview');
  const slot = isCard ? root.parentElement : root;
  const availW = Math.max(160, slot.clientWidth || root.clientWidth || 0);
  const scale = availW / 1122;
  root.style.setProperty('--cert-scale', String(scale));
  cert.style.width = '1122px';
  cert.style.height = '794px';
  cert.style.maxWidth = 'none';
  if (isCard) {
    // Parent aspect-ratio already matches A4 — absolute child fills it
    root.style.height = '';
  } else {
    root.style.height = `${Math.ceil(794 * scale)}px`;
  }
}

async function imageToDataUrl(src) {
  if (!src) return '';
  const abs = new URL(src, window.location.href).href;
  try {
    const res = await fetch(abs, { credentials: 'same-origin', cache: 'force-cache' });
    if (!res.ok) throw new Error(String(res.status));
    const blob = await res.blob();
    return await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(String(reader.result || ''));
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  } catch (_) {
    return abs;
  }
}

async function printCertificateOnly() {
  const root = document.getElementById('cert-print-root');
  const cert = root && root.querySelector('.pts-cert');
  if (!cert) return;

  // Clone and embed images as data URLs (iframe is about:blank so /uploads paths break)
  const clone = cert.cloneNode(true);
  clone.style.transform = 'none';
  clone.style.maxWidth = 'none';
  clone.style.margin = '0';
  clone.style.boxShadow = 'none';

  const imgs = Array.from(clone.querySelectorAll('img'));
  await Promise.all(imgs.map(async (img) => {
    const srcAttr = img.getAttribute('src') || '';
    const candidates = [];
    if (img.currentSrc) candidates.push(img.currentSrc);
    if (img.src) candidates.push(img.src);
    if (srcAttr) candidates.push(srcAttr);
    if (/stamp/i.test(img.className) || /stamp/i.test(img.alt || '')) {
      candidates.push(PA_STAMP, PA_STAMP_FALLBACK);
    } else {
      candidates.push(PA_LOGO, PA_LOGO_FALLBACK);
    }
    let dataUrl = '';
    for (const src of candidates) {
      dataUrl = await imageToDataUrl(src);
      if (dataUrl && dataUrl.startsWith('data:')) break;
    }
    if (dataUrl) {
      img.removeAttribute('onerror');
      img.setAttribute('src', dataUrl);
      img.src = dataUrl;
    }
  }));

  let frame = document.getElementById('cert-print-frame');
  if (!frame) {
    frame = document.createElement('iframe');
    frame.id = 'cert-print-frame';
    frame.title = 'พิมพ์ใบประกาศ';
    frame.setAttribute('aria-hidden', 'true');
    frame.style.cssText = 'position:fixed;width:0;height:0;border:0;left:-9999px;top:0;opacity:0;pointer-events:none;';
    document.body.appendChild(frame);
  }

  const cssHref = new URL('certificates.css?v=20260724h', window.location.href).href;
  const fontsHref = 'https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Sarabun:wght@300;400;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap';
  const baseHref = `${window.location.origin}/`;
  const html = `<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<base href="${baseHref}">
<title>ใบประกาศนียบัตร</title>
<link rel="stylesheet" href="${cssHref}">
<link href="${fontsHref}" rel="stylesheet">
<style>
  @page { size: A4 landscape; margin: 0; }
  html, body { margin: 0; padding: 0; background: #fff; }
  body { width: 297mm; height: 210mm; overflow: hidden; }
  .pts-cert {
    width: 297mm !important;
    height: 210mm !important;
    max-width: none !important;
    margin: 0 !important;
    box-shadow: none !important;
    transform: none !important;
    padding: 6mm !important;
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
  .pts-cert img {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
</style>
</head>
<body>${clone.outerHTML}</body>
</html>`;

  const win = frame.contentWindow;
  const doc = frame.contentDocument || (win && win.document);
  if (!doc || !win) {
    document.body.classList.add('cert-printing');
    root.style.setProperty('--cert-scale', '1');
    root.style.height = '';
    const restore = () => {
      document.body.classList.remove('cert-printing');
      window.removeEventListener('afterprint', restore);
      fitCertPreview(root);
    };
    window.addEventListener('afterprint', restore);
    window.print();
    setTimeout(restore, 2000);
    return;
  }

  doc.open();
  doc.write(html);
  doc.close();

  let printed = false;
  const triggerPrint = () => {
    if (printed) return;
    printed = true;
    try {
      win.focus();
      win.print();
    } catch (_) {
      window.print();
    }
  };

  setTimeout(triggerPrint, 400);
}

function modeTag(mode) {
  const m = String(mode || '').toLowerCase();
  if (m === 'online') return { cls: 'cert-tag--online', label: 'Online' };
  if (m === 'onsite') return { cls: 'cert-tag--onsite', label: 'Onsite' };
  if (m === 'hybrid') return { cls: 'cert-tag--hybrid', label: 'Hybrid' };
  return { cls: 'cert-tag--default', label: 'หลักสูตร PTS' };
}

function filteredList() {
  let list = allCerts.slice();
  if (query) {
    const q = query.toLowerCase();
    list = list.filter((c) => String(c.course_name || '').toLowerCase().includes(q));
  }
  if (filterMode === 'az') {
    list.sort((a, b) => String(a.course_name || '').localeCompare(String(b.course_name || ''), 'th'));
  } else {
    list.sort((a, b) => new Date(certCompletionDate(b)) - new Date(certCompletionDate(a)));
  }
  return list;
}

function openCert(cert) {
  const root = document.getElementById('cert-print-root');
  root.innerHTML = certificateHtml({
    userName,
    courseName: cert.course_name,
    issuedAt: cert.issued_at
  });
  const modal = document.getElementById('cert-modal');
  modal.classList.add('is-open');
  modal.setAttribute('aria-hidden', 'false');
  document.body.classList.add('cert-modal-open');
  document.body.style.overflow = 'hidden';
  requestAnimationFrame(() => {
    fitCertPreview(root);
    requestAnimationFrame(() => fitCertPreview(root));
  });
}

function closeCert() {
  const modal = document.getElementById('cert-modal');
  modal.classList.remove('is-open');
  modal.setAttribute('aria-hidden', 'true');
  document.body.classList.remove('cert-modal-open');
  document.body.style.overflow = '';
}

async function shareCert(cert) {
  const text = `ฉันได้รับใบประกาศนียบัตรหลักสูตร “${cert.course_name}” จาก Personal Assistant Academy (รหัส ${cert.certificate_code})`;
  try {
    if (navigator.share) {
      await navigator.share({ title: 'PA Academy Certificate', text });
      return;
    }
  } catch (_) { /* user cancelled */ }
  try {
    await navigator.clipboard.writeText(text);
    alert('คัดลอกข้อความแชร์แล้ว');
  } catch (_) {
    prompt('คัดลอกข้อความนี้', text);
  }
}

function render() {
  const grid = document.getElementById('cert-grid');
  document.getElementById('count-all').textContent = String(allCerts.length);
  const list = filteredList();

  if (!allCerts.length) {
    grid.innerHTML = `
      <div class="pts-empty" style="grid-column:1/-1">
        <div class="pts-empty__icon"><span class="material-symbols-outlined">workspace_premium</span></div>
        <p class="font-bold mb-1">ยังไม่มีใบประกาศนียบัตร</p>
        <p class="text-sm mb-4">เรียนให้จบหลักสูตร ระบบจะออกใบประกาศฟอร์แมตมาตรฐานให้อัตโนมัติ</p>
        <a class="pts-btn pts-btn-primary" href="Courses.html">ไปที่หลักสูตร</a>
      </div>`;
    return;
  }

  if (!list.length) {
    grid.innerHTML = `<div class="pts-empty" style="grid-column:1/-1"><p>ไม่พบหลักสูตรที่ตรงกับคำค้นหา</p></div>`;
    return;
  }

  const cards = list.map((c) => {
    const dateText = new Date(c.issued_at).toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
    const preview = certificateHtml({
      userName,
      courseName: c.course_name,
      issuedAt: c.issued_at
    });
    return `
      <article class="cert-card">
        <div class="cert-card__preview">
          <div class="cert-card__preview-scale">${preview}</div>
        </div>
        <div class="cert-card__body">
          <h3 class="cert-card__title">${escapeHtml(c.course_name)}</h3>
          <p class="cert-card__meta">ได้รับเมื่อ: ${escapeHtml(dateText)}</p>
          <div class="cert-card__actions">
            <button type="button" class="pts-btn pts-btn-primary cert-download" data-id="${c.certificate_id}">
              <span class="material-symbols-outlined" style="font-size:18px">download</span>
              ดู / ดาวน์โหลด PDF
            </button>
            <button type="button" class="cert-share" data-id="${c.certificate_id}" aria-label="แชร์ใบประกาศ">
              <span class="material-symbols-outlined">share</span>
            </button>
          </div>
        </div>
      </article>`;
  }).join('');

  const teaser = `
    <aside class="cert-teaser">
      <div class="cert-teaser__icon"><span class="material-symbols-outlined">school</span></div>
      <p>ยังรอคุณอยู่! เรียนให้จบอีกหลักสูตรเพื่อรับใบประกาศถัดไป</p>
      <a href="DashbordU.html">ไปที่หลักสูตรของฉัน</a>
    </aside>`;

  grid.innerHTML = cards + teaser;

  const fitCards = () => {
    grid.querySelectorAll('.cert-card__preview-scale').forEach((el) => fitCertPreview(el));
  };
  requestAnimationFrame(() => {
    fitCards();
    requestAnimationFrame(fitCards);
  });

  grid.querySelectorAll('.cert-download').forEach((btn) => {
    btn.onclick = () => {
      const cert = allCerts.find((c) => String(c.certificate_id) === btn.dataset.id);
      if (!cert) return;
      openCert(cert);
    };
  });
  grid.querySelectorAll('.cert-share').forEach((btn) => {
    btn.onclick = () => {
      const cert = allCerts.find((c) => String(c.certificate_id) === btn.dataset.id);
      if (cert) shareCert(cert);
    };
  });
}

async function init() {
  const me = await fetch('/api/users/me', { credentials: 'include' }).then((r) => r.json());
  if (!me.loggedIn) return location.href = 'Login.html';
  userName = me.user?.name || me.user?.full_name || 'ผู้เรียน';

  const res = await fetch('/api/my/certificates', { credentials: 'include' });
  const data = await res.json();
  if (!res.ok || data.success === false) {
    document.getElementById('cert-grid').innerHTML =
      `<div class="pts-empty" style="grid-column:1/-1"><p class="pts-msg--err">${escapeHtml(data.message || 'โหลดไม่สำเร็จ')}</p></div>`;
    return;
  }
  allCerts = data.data || [];
  render();

  document.getElementById('cert-q').addEventListener('input', (e) => {
    query = String(e.target.value || '').trim();
    render();
  });
  document.querySelectorAll('.cert-filter').forEach((btn) => {
    btn.onclick = () => {
      document.querySelectorAll('.cert-filter').forEach((b) => b.classList.remove('is-active'));
      btn.classList.add('is-active');
      filterMode = btn.dataset.filter || 'all';
      render();
    };
  });
  document.getElementById('cert-close-btn').onclick = closeCert;
  document.getElementById('cert-print-btn').onclick = () => printCertificateOnly();
  document.getElementById('cert-modal').addEventListener('click', (e) => {
    if (e.target.id === 'cert-modal') closeCert();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeCert();
  });
  window.addEventListener('resize', () => {
    document.querySelectorAll('.cert-card__preview-scale').forEach((el) => fitCertPreview(el));
    const modal = document.getElementById('cert-modal');
    if (modal && modal.classList.contains('is-open')) {
      fitCertPreview(document.getElementById('cert-print-root'));
    }
  });
}

init().catch((err) => {
  document.getElementById('cert-grid').innerHTML =
    `<div class="pts-empty" style="grid-column:1/-1"><p class="pts-msg--err">${escapeHtml(err.message)}</p></div>`;
});
</script>
<script src="/comp/user-sidebar.js?v=20260723e"></script>
<script src="/comp/navbar.js?v=20260723d"></script>
</body>
</html>
