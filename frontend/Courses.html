<span class="material-symbols-outlined">person</span>
<span class="font-label-md text-[10px]">โปรไฟล์</span>
</button>

<script>
 document.addEventListener('DOMContentLoaded', () => {
    const filterButtons = document.querySelectorAll('[data-filter]');
    const coursesGrid = document.getElementById('courses-grid');
    const apiUrl = '/api/courses';

    const getBadge = mode => {
      if (mode === 'online') return { label: 'Online', classes: 'bg-[#E8F5E9] text-[#2E7D32]' };
      if (mode === 'onsite') return { label: 'Onsite', classes: 'bg-[#FFF3E0] text-[#EF6C00]' };
      return { label: 'Hybrid', classes: 'bg-[#E3F2FD] text-[#1565C0]' };
    };

    const formatText = value => value ? value : '-';
    const sentenceCase = text => text ? text.charAt(0).toUpperCase() + text.slice(1) : '-';

    const makeCourseCard = course => {
      const badge = getBadge((course.delivery_mode || '').toLowerCase());
      const avgRating = Number(course.average_rating || 0).toFixed(1);
      const reviews = course.total_reviews || 0;
      const hours = Number(course.total_hours || 0).toFixed(1).replace('.0', '');
      const difficulty = sentenceCase(course.difficulty_level);
      const imageUrl = course.cover_image_url || 'https://via.placeholder.com/640x400?text=PTS+Course';

      return `
        <div data-type="${(course.delivery_mode || '').toLowerCase()}" class="group bg-white rounded-[24px] overflow-hidden shadow-sm hover:shadow-xl transition-all duration-500 flex flex-col border border-outline-variant/10">
          <div class="relative aspect-[16/10] overflow-hidden">
            <img class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" src="${imageUrl}" alt="${formatText(course.course_name)}">
            <div class="absolute top-4 left-4 flex flex-wrap gap-2">
              ${course.is_featured ? '<span class="bg-secondary-container text-on-secondary-container px-3 py-1 rounded-full text-[12px] font-bold shadow-sm">ยอดนิยม</span>' : ''}
              <span class="px-3 py-1 rounded-full text-[12px] font-bold shadow-sm ${badge.classes}">${badge.label}</span>
            </div>
          </div>
          <div class="p-md flex flex-col flex-grow">
            <div class="flex items-center gap-xs mb-base">
              <span class="material-symbols-outlined text-[16px] text-tertiary">star</span>
              <span class="font-label-md text-label-md text-on-surface-variant">${avgRating} (${reviews} รีวิว)</span>
            </div>
            <h3 class="font-headline-sm text-headline-sm text-on-surface group-hover:text-primary transition-colors mb-base line-clamp-2 leading-relaxed">${formatText(course.course_name)}</h3>
            <p class="font-body-sm text-body-sm text-on-surface-variant mb-md">โดย ${formatText(course.instructor_name)}</p>
            <div class="mt-auto space-y-md">
              <div class="flex items-center justify-between text-on-surface-variant font-label-md flex-wrap gap-xs">
                <div class="flex items-center gap-xs">
                  <span class="material-symbols-outlined text-[18px]">schedule</span>
                  ${hours} ชั่วโมง
                </div>
                <div class="flex items-center gap-xs">
                  <span class="material-symbols-outlined text-[18px]">signal_cellular_alt</span>
                  ${difficulty}
                </div>
              </div>
              <button type="button" data-course-id="${course.course_id}" class="course-detail-btn w-full bg-surface-container-low text-primary hover:bg-primary hover:text-white py-sm rounded-full font-label-md transition-all active:scale-95 flex justify-center items-center gap-sm">
                ดูรายละเอียด / สมัครเรียน
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
              </button>
            </div>
          </div>
        </div>
      `;
    };

    const setActiveButton = selectedButton => {
      filterButtons.forEach(button => {
        button.classList.remove('bg-primary', 'text-white');
        button.classList.add('bg-surface-container-lowest', 'border', 'border-outline-variant', 'text-on-surface-variant');
      });
      selectedButton.classList.remove('bg-surface-container-lowest', 'border', 'border-outline-variant', 'text-on-surface-variant');
      selectedButton.classList.add('bg-primary', 'text-white');
    };

    const filterCourses = filter => {
      const cards = Array.from(coursesGrid.querySelectorAll('[data-type]'));
      cards.forEach(card => {
        const type = (card.dataset.type || '').toLowerCase();
        if (filter === 'all' || type === (filter || '').toLowerCase()) {
          card.classList.remove('hidden');
        } else {
          card.classList.add('hidden');
        }
      });
    };

    let allCourses = [];

    const openCourseModal = (course) => {
      const existing = document.getElementById('course-modal');
      if (existing) existing.remove();

      const badge = getBadge((course.delivery_mode || '').toLowerCase());
      const modal = document.createElement('div');
      modal.id = 'course-modal';
      modal.className = 'fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/40';
      modal.innerHTML = `
        <div class="bg-white rounded-[24px] max-w-lg w-full p-md shadow-xl relative">
          <button type="button" id="close-course-modal" class="absolute top-3 right-3 p-2 rounded-full hover:bg-surface-container-low">
            <span class="material-symbols-outlined">close</span>
          </button>
          <img src="${course.cover_image_url || 'https://via.placeholder.com/640x400?text=PTS+Course'}" alt="" class="w-full h-40 object-cover rounded-2xl mb-md">
          <span class="inline-block px-3 py-1 rounded-full text-[12px] font-bold mb-sm ${badge.classes}">${badge.label}</span>
          <h3 class="font-headline-sm text-headline-sm mb-xs">${formatText(course.course_name)}</h3>
          <p class="font-body-sm text-body-sm text-on-surface-variant mb-sm">โดย ${formatText(course.instructor_name)}</p>
          <p class="font-body-sm text-body-sm text-on-surface-variant mb-md">
            ${Number(course.total_hours || 0).toFixed(1).replace('.0', '')} ชั่วโมง · ระดับ ${sentenceCase(course.difficulty_level)} · คะแนน ${Number(course.average_rating || 0).toFixed(1)}
          </p>
          <button type="button" id="enroll-course-btn" data-course-id="${course.course_id}"
            class="w-full bg-primary text-white py-sm rounded-full font-bold hover:opacity-90 active:scale-95 transition-all">
            สมัครเรียนคอร์สนี้
          </button>
          <p id="enroll-message" class="mt-sm text-center text-[14px] text-on-surface-variant"></p>
        </div>
      `;
      document.body.appendChild(modal);

      modal.querySelector('#close-course-modal').onclick = () => modal.remove();
      modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });

      modal.querySelector('#enroll-course-btn').onclick = async (e) => {
        const btn = e.currentTarget;
        const msg = modal.querySelector('#enroll-message');
        btn.disabled = true;
        btn.textContent = 'กำลังสมัครเรียน...';
        try {
          const response = await fetch(`/api/courses/${course.course_id}/enroll`, {
            method: 'POST',
            credentials: 'include'
          });
          const result = await response.json();
          if (response.status === 401) {
            alert('กรุณาเข้าสู่ระบบก่อนสมัครเรียน');
            window.location.href = 'Login.html';
            return;
          }
          if (!response.ok || !result.success) throw new Error(result.message || 'สมัครเรียนไม่สำเร็จ');
          msg.textContent = result.message;
          msg.className = 'mt-sm text-center text-[14px] text-primary font-bold';
          btn.textContent = result.already_enrolled ? 'สมัครไว้แล้ว' : 'สมัครเรียนสำเร็จ';
          if (!result.already_enrolled) {
            setTimeout(() => { window.location.href = 'DashbordU.html'; }, 800);
          }
        } catch (error) {
          msg.textContent = error.message;
          msg.className = 'mt-sm text-center text-[14px] text-error';
          btn.disabled = false;
          btn.textContent = 'สมัครเรียนคอร์สนี้';
        }
      };
    };

    const renderCourseList = courses => {
      allCourses = courses || [];
      if (!courses || !courses.length) {
        coursesGrid.innerHTML = '<div class="col-span-full rounded-[24px] bg-white p-md text-on-surface-variant shadow-sm">ไม่พบหลักสูตรในขณะนี้</div>';
        return;
      }
      coursesGrid.innerHTML = courses.map(makeCourseCard).join('');
    };

    coursesGrid.addEventListener('click', (e) => {
      const btn = e.target.closest('.course-detail-btn');
      if (!btn) return;
      const courseId = Number(btn.getAttribute('data-course-id'));
      const course = allCourses.find(c => Number(c.course_id) === courseId);
      if (course) openCourseModal(course);
    });

    filterButtons.forEach(button => {
      button.addEventListener('click', () => {
        const filter = button.dataset.filter;
        setActiveButton(button);
        filterCourses(filter);
      });
    });

    const handleUrlFilter = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const urlFilter = urlParams.get('filter');
        
        if (urlFilter) {
            console.log('🤖 ตรวจพบคำสั่งกรองจาก URL:', urlFilter);
            filterCourses(urlFilter);
            
            filterButtons.forEach(btn => {
                btn.classList.remove('bg-primary', 'text-white');
                btn.classList.add('bg-surface-container-lowest', 'border', 'border-outline-variant', 'text-on-surface-variant');
            });
            
            if (urlFilter === 'all') {
                const btnAll = document.querySelector('[data-filter="all"]');
                if (btnAll) setActiveButton(btnAll);
            }
        }
    };

    const loadCourses = async () => {
      try {
        const response = await fetch(apiUrl, { credentials: 'include' });
        const payload = await response.json();
        
        if (!response.ok || !payload.success) {
          throw new Error(payload.message || 'ไม่สามารถโหลดข้อมูลคอร์สได้');
        }
        
        renderCourseList(payload.data || []);
        handleUrlFilter();

      } catch (error) {
        coursesGrid.innerHTML = `<div class="col-span-full rounded-[24px] bg-white p-md text-error bg-error-container shadow-sm text-center">${error.message}</div>`;
      }
    };

    window.addEventListener('popstate', handleUrlFilter);
    loadCourses();
});
</script>
