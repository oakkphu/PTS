<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หลักสูตร | PTS Learning</title>
<link rel="stylesheet" href="/comp/site.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
</head>
<body class="pts-body">
<div id="app-navbar"></div>
<main class="pts-main pts-main--wide">
  <section class="pts-page-hero">
    <div style="display:flex;flex-wrap:wrap;gap:16px;align-items:end;justify-content:space-between">
      <div>
        <span class="pts-chip mb-3" style="margin-bottom:12px">PTS Courses</span>
        <h1 class="pts-display" style="margin:0 0 8px;font-size:clamp(28px,4vw,40px);font-weight:800;color:var(--pts-primary)">หลักสูตรทั้งหมด</h1>
        <p id="hero-sub" style="margin:0;color:var(--pts-muted);max-width:36rem">เลือก Online / Onsite / Hybrid ที่เหมาะกับเป้าหมายของคุณ</p>
      </div>
      <div id="hero-actions" style="display:flex;flex-wrap:wrap;gap:8px"></div>
    </div>
  </section>

  <div id="guest-banner" class="pts-auth-banner hidden">
    <div>
      <strong>โหมดดูหลักสูตรอย่างเดียว</strong>
      <p style="margin:4px 0 0;font-size:14px">ต้องการสมัครเรียนหรือบันทึกโปรด? <a href="Login.html" style="color:var(--pts-primary);font-weight:700">เข้าสู่ระบบ</a></p>
    </div>
  </div>

  <div class="fs-cat-row" id="filters" style="margin-bottom:22px">
    <button type="button" data-filter="all" class="fs-cat is-active">ทั้งหมด</button>
    <button type="button" data-filter="online" class="fs-cat">Online</button>
    <button type="button" data-filter="onsite" class="fs-cat">Onsite</button>
    <button type="button" data-filter="hybrid" class="fs-cat">Hybrid</button>
  </div>

  <div id="courses-grid" class="fs-grid"></div>
</main>
<footer class="fs-footer">
  <div class="fs-footer__inner">
    <div>
      <strong style="color:#fff;font-family:var(--pts-display)">PTS Learning</strong>
      <p style="margin:8px 0 0;font-size:14px">Personal Assistant Academy</p>
    </div>
    <div style="display:flex;gap:16px;flex-wrap:wrap">
      <a href="Home.html">หน้าแรก</a>
      <a href="Community.html">คอมมูนิตี้</a>
      <a href="Legal.html">นโยบาย</a>
    </div>
  </div>
  <div class="fs-footer__copy">© PTS Learning</div>
</footer>

<script>
let currentUser = null;
let allCourses = [];
const escapeHtml = (t) => String(t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function modeLabel(mode) {
  const m = String(mode || '').toLowerCase();
  if (m === 'onsite') return 'Onsite';
  if (m === 'hybrid') return 'Hybrid';
  return 'Online';
}

function renderAuthChrome() {
  const guest = document.getElementById('guest-banner');
  const hero = document.getElementById('hero-actions');
  const sub = document.getElementById('hero-sub');
  if (currentUser) {
    guest.classList.add('hidden');
    sub.textContent = 'สมัครเรียน บันทึกคอร์สโปรด และเข้าเรียนได้ทันทีหลังล็อกอิน';
    hero.innerHTML = `
      <a class="pts-btn pts-btn-outline" href="Favorites.html">คอร์สโปรด</a>
      <a class="pts-btn pts-btn-primary" href="DashbordU.html">แดชบอร์ด</a>`;
  } else {
    guest.classList.remove('hidden');
    sub.textContent = 'ยังไม่ล็อกอิน: ดูรายละเอียดหลักสูตรได้อย่างเดียว';
    hero.innerHTML = '';
  }
}

function makeCourseCard(course) {
  const mode = (course.delivery_mode || '').toLowerCase();
  const favorited = Number(course.is_favorited) === 1;
  const enrolled = Number(course.is_enrolled) === 1;
  const price = Number(course.price || 0);
  const hours = Number(course.total_hours || 0);
  const img = course.cover_image_url || 'https://placehold.co/640x400/f6e6ea/974258?text=PTS';
  return `
    <article class="fs-course-card" data-type="${escapeHtml(mode)}">
      <a href="CourseDetail.html?courseId=${course.course_id}" class="fs-course-card__media">
        <img src="${img}" alt="">
        <span class="fs-course-card__badge pts-chip">${escapeHtml(modeLabel(mode))}</span>
      </a>
      <div class="fs-course-card__body">
        <a href="CourseDetail.html?courseId=${course.course_id}">
          <h3 class="fs-course-card__title">${escapeHtml(course.course_name || '')}</h3>
        </a>
        <p class="fs-course-card__meta">โดย ${escapeHtml(course.instructor_name || '-')} · ${hours} ชม.</p>
        <div class="fs-course-card__footer">
          <span class="fs-course-card__price">${price ? '฿' + price.toLocaleString('th-TH') : 'สอบถามราคา'}</span>
          <div style="display:flex;gap:6px;align-items:center">
            ${currentUser ? `<button type="button" class="fav-btn pts-btn pts-btn-ghost ${favorited ? 'pts-like-active' : ''}" data-course-id="${course.course_id}" style="padding:8px" title="โปรด"><span class="material-symbols-outlined">favorite</span></button>` : ''}
            <a class="pts-btn ${enrolled ? 'pts-btn-outline' : 'pts-btn-primary'}" style="padding:8px 14px;font-size:13px" href="CourseDetail.html?courseId=${course.course_id}">
              ${enrolled ? 'เข้าเรียน' : 'รายละเอียด'}
            </a>
          </div>
        </div>
      </div>
    </article>`;
}

function renderCourses(list) {
  const grid = document.getElementById('courses-grid');
  if (!list.length) {
    grid.innerHTML = '<div class="pts-empty" style="grid-column:1/-1">ไม่พบหลักสูตรในขณะนี้</div>';
    return;
  }
  grid.innerHTML = list.map(makeCourseCard).join('');
}

function applyFilter(key) {
  const k = (key || 'all').toLowerCase();
  document.querySelectorAll('#filters .fs-cat').forEach(b => {
    b.classList.toggle('is-active', b.dataset.filter === k);
  });
  if (k === 'all') return renderCourses(allCourses);
  renderCourses(allCourses.filter(c => String(c.delivery_mode || '').toLowerCase() === k));
}

document.getElementById('filters').addEventListener('click', (e) => {
  const btn = e.target.closest('.fs-cat');
  if (!btn) return;
  applyFilter(btn.dataset.filter);
});

document.getElementById('courses-grid').addEventListener('click', async (e) => {
  const btn = e.target.closest('.fav-btn');
  if (!btn) return;
  e.preventDefault();
  if (!currentUser) return location.href = 'Login.html';
  const res = await fetch(`/api/courses/${btn.dataset.courseId}/favorite`, { method: 'POST', credentials: 'include' });
  const data = await res.json();
  if (!res.ok || !data.success) return alert(data.message || 'ไม่สำเร็จ');
  const course = allCourses.find(c => String(c.course_id) === String(btn.dataset.courseId));
  if (course) course.is_favorited = data.favorited ? 1 : 0;
  const active = document.querySelector('#filters .fs-cat.is-active')?.dataset.filter || 'all';
  applyFilter(active);
});

(async () => {
  const me = await fetch('/api/users/me', { credentials: 'include' }).then(r => r.json());
  currentUser = me.loggedIn ? me.user : null;
  renderAuthChrome();

  const res = await fetch('/api/courses', { credentials: 'include' });
  const data = await res.json();
  if (!res.ok || !data.success) {
    document.getElementById('courses-grid').innerHTML = `<div class="pts-empty pts-msg--err" style="grid-column:1/-1">${escapeHtml(data.message || 'โหลดไม่สำเร็จ')}</div>`;
    return;
  }
  allCourses = data.data || [];
  const preset = new URLSearchParams(location.search).get('filter') || 'all';
  applyFilter(preset);
})();
</script>
<script src="/comp/navbar.js"></script>
</body>
</html>
