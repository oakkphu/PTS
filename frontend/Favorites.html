<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คอร์สโปรด | PTS Learning</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link rel="stylesheet" href="/comp/site.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:'#974258','on-surface-variant':'#544245',error:'#ba1a1a'}}}}</script>
</head>
<body class="pts-body">
<div id="app-navbar"></div>
<main class="pts-main">
  <section class="pts-page-hero">
    <span class="pts-chip mb-3">Favorite Courses</span>
    <h1 class="text-3xl font-bold text-primary mb-2">คอร์สที่ถูกใจ</h1>
    <p class="text-on-surface-variant">คอร์สที่คุณบันทึกไว้ เพื่อกลับมาสมัครเรียนหรือเข้าเรียนต่อได้ง่าย</p>
    <div class="mt-4 flex gap-2">
      <a class="pts-btn pts-btn-outline" href="Courses.html">ดูหลักสูตรทั้งหมด</a>
      <a class="pts-btn pts-btn-primary" href="DashbordU.html">แดชบอร์ด</a>
    </div>
  </section>
  <div id="list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
</main>
<script>
const escapeHtml = (t) => String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
(async () => {
  const me = await fetch('/api/users/me', { credentials:'include' }).then(r=>r.json());
  if (!me.loggedIn) return location.href = 'Login.html';
  const box = document.getElementById('list');
  const res = await fetch('/api/my/favorite-courses', { credentials:'include' });
  const data = await res.json();
  if (!res.ok || !data.success) {
    box.innerHTML = `<div class="pts-card p-5 text-error col-span-full">${escapeHtml(data.message||'โหลดไม่สำเร็จ')}</div>`;
    return;
  }
  if (!data.data.length) {
    box.innerHTML = `<div class="pts-empty pts-card col-span-full">ยังไม่มีคอร์สโปรด<br><a class="text-primary font-bold" href="Courses.html">ไปเลือกหลักสูตร</a></div>`;
    return;
  }
  box.innerHTML = data.data.map(c => `
    <article class="pts-card overflow-hidden">
      <img class="w-full h-40 object-cover" src="${c.cover_image_url || 'https://via.placeholder.com/640x400?text=PTS+Course'}" alt="">
      <div class="p-4">
        <p class="text-xs font-bold text-primary uppercase mb-1">${escapeHtml(c.delivery_mode||'')}</p>
        <h2 class="font-bold text-lg mb-1">${escapeHtml(c.course_name)}</h2>
        <p class="text-sm text-on-surface-variant mb-4">โดย ${escapeHtml(c.instructor_name||'-')}</p>
        <div class="flex flex-wrap gap-2">
          ${Number(c.is_enrolled) ? `<a class="pts-btn pts-btn-primary" href="Learn.html?courseId=${c.course_id}">เข้าเรียน</a>` : `<a class="pts-btn pts-btn-primary" href="Courses.html">สมัครเรียน</a>`}
          <button class="unfav pts-btn pts-btn-outline" data-id="${c.course_id}">นำออกจากโปรด</button>
        </div>
      </div>
    </article>`).join('');

  box.addEventListener('click', async (e) => {
    const btn = e.target.closest('.unfav');
    if (!btn) return;
    const r = await fetch(`/api/courses/${btn.dataset.id}/favorite`, { method:'POST', credentials:'include' });
    const j = await r.json();
    if (!r.ok || !j.success) return alert(j.message||'ไม่สำเร็จ');
    btn.closest('article').remove();
    if (!box.children.length) box.innerHTML = `<div class="pts-empty pts-card col-span-full">ยังไม่มีคอร์สโปรด</div>`;
  });
})();
</script>
<script src="/comp/navbar.js"></script>
</body>
</html>
