<main class="pts-main pts-main--wide">
  <section class="pts-page-hero mb-5">
    <span class="pts-chip mb-3">Learning</span>
    <h1 id="course-title" class="text-2xl md:text-3xl font-bold text-primary pts-display">กำลังโหลด...</h1>
  </section>
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-5">

      <div id="lesson-list" class="space-y-2"></div>
    </aside>
    <section class="lg:col-span-8 pts-panel min-h-[480px]">

    </section>
  </div>
</main>
<div class="pts-footer-note">© PTS Learning</div>
<script>
const params = new URLSearchParams(location.search);
const courseId = params.get('courseId');
const focusLessonId = params.get('lessonId');
const escapeHtml = (t) => String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

async function loadCourseLessons() {
  if (!courseId) {
    document.getElementById('course-title').textContent = 'ไม่พบรหัสคอร์ส';
    return;
  }
  const res = await fetch(`/api/courses/${courseId}/lessons`, { credentials: 'include' });
  const data = await res.json();
  if (res.status === 401) return location.href = 'Login.html';
  if (!res.ok || !data.success) throw new Error(data.message || 'โหลดบทเรียนไม่สำเร็จ');
  if (!data.enrolled) {
    document.getElementById('course-title').textContent = data.course.course_name;
    document.getElementById('lesson-view').innerHTML = `<div class="pts-empty" style="border:none;padding:24px 0"><p class="mb-4">คุณยังไม่ได้สมัครคอร์สนี้</p><a class="pts-btn pts-btn-primary" href="Courses.html">ไปสมัครเรียน</a></div>`;
    return;
  }
  document.getElementById('course-title').textContent = data.course.course_name;
  const list = document.getElementById('lesson-list');
  if (!data.data.length) {
    list.innerHTML = '<p class="text-sm text-on-surface-variant p-2">ยังไม่มีบทเรียนในคอร์สนี้</p>';
    document.getElementById('lesson-view').innerHTML = '<div class="pts-empty" style="border:none">ยังไม่มีบทเรียนให้เรียน</div>';
    return;
  }
  list.innerHTML = data.data.map(l => `
    <button data-id="${l.lesson_id}" class="lesson-item w-full text-left p-3 rounded-xl border transition ${Number(l.completed) ? 'border-emerald-200 bg-emerald-50' : 'border-[var(--pts-border)] hover:bg-[var(--pts-primary-soft)]'}">
      <div class="font-semibold text-sm">${escapeHtml(l.title)}</div>
      <div class="text-xs text-on-surface-variant mt-1">${l.duration_minutes || 0} นาที ${Number(l.completed) ? '· เรียนจบแล้ว' : ''}</div>
    </button>
  `).join('');

  list.onclick = (e) => {
    const btn = e.target.closest('.lesson-item');
    if (!btn) return;
    openLesson(btn.dataset.id);
  };

  const first = focusLessonId || (data.data[0] && data.data[0].lesson_id);
  if (first) openLesson(first);
}

async function openLesson(lessonId) {
  const view = document.getElementById('lesson-view');
  view.innerHTML = 'กำลังโหลดบทเรียน...';
  const res = await fetch(`/api/lessons/${lessonId}`, { credentials: 'include' });
  const data = await res.json();
  if (!res.ok || !data.success) {
    view.innerHTML = `<p class="pts-msg--err">${escapeHtml(data.message || 'โหลดไม่สำเร็จ')}</p>`;
    return;
  }
  const lesson = data.data;
  const video = lesson.video_url
    ? `<div class="aspect-video mb-5 rounded-xl overflow-hidden bg-black"><iframe class="w-full h-full" src="${escapeHtml(lesson.video_url)}" allowfullscreen></iframe></div>`
    : '';
  view.innerHTML = `
    <h2 class="text-2xl font-bold mb-2 pts-display">${escapeHtml(lesson.title)}</h2>
    <p class="text-sm text-on-surface-variant mb-5">${lesson.duration_minutes || 0} นาที · ${escapeHtml(lesson.course_name || '')}</p>
    ${video}
    <div class="leading-relaxed mb-6 text-[15px]">${lesson.content_html || '<p>ยังไม่มีเนื้อหา</p>'}</div>
    <button id="complete-btn" class="pts-btn pts-btn-primary ${Number(lesson.completed) ? 'opacity-60' : ''}">
      ${Number(lesson.completed) ? 'เรียนจบบทนี้แล้ว' : 'ทำเครื่องหมายว่าเรียนจบ'}
    </button>
    <p id="complete-msg" class="pts-msg"></p>
  `;
  document.getElementById('complete-btn').onclick = async () => {
    const r = await fetch(`/api/lessons/${lessonId}/complete`, { method: 'POST', credentials: 'include' });
    const j = await r.json();
    const msg = document.getElementById('complete-msg');
    if (!r.ok || !j.success) { msg.textContent = j.message || 'บันทึกไม่สำเร็จ'; msg.className='pts-msg pts-msg--err'; return; }
    msg.textContent = `บันทึกแล้ว ความคืบหน้าคอร์ส ${j.progress}% (${j.completed}/${j.total} บท)`;
    msg.className = 'pts-msg pts-msg--ok';
    loadCourseLessons();
  };
}

loadCourseLessons().catch(err => {
  document.getElementById('lesson-view').innerHTML = `<p class="pts-msg--err">${escapeHtml(err.message)}</p>`;
});
</script>
