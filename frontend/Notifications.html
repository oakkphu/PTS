<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>การแจ้งเตือน | PTS Learning</title>
<script src="/comp/theme-boot.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<link rel="stylesheet" href="site.css?v=20260724w">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:'#974258','on-surface-variant':'#544245',error:'#ba1a1a'}}}}</script>
</head>
<body class="pts-body">
<div id="app-navbar">
  <nav style="position:fixed;top:0;left:0;right:0;z-index:99999;height:68px;background:var(--pts-nav-bg,#fff);border-bottom:1px solid var(--pts-border,rgba(151,66,88,.18));">
    <div style="max-width:1120px;margin:0 auto;height:100%;padding:0 16px;display:flex;align-items:center;justify-content:space-between;">
      <a href="Home.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--pts-text,#1c1520);font-weight:700;">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuABTNhK77NiL0IuFIQlI6OT3Vifm8qP13KVh2E7ow7C1nBZBzvCmxbfbPcqp_ufJqTB-yyShP5xCpLknrMb_L-Giu18pK_I31kIyaQ_R7QyIYjEwf6o5aRyjEY_AdnfLq2rmWtA8WnFI9-AaODwblGI-IcbELscflTPE3ViIRI0pz8sPdppAL4lmeCdpzCdbWVJVt8CsBOnK5aNpm5LSEzvcUIMq56MlbLb0noVVSeb7AcP1xu4117jog" alt="PTS Learning" style="height:42px;width:auto;max-width:160px;object-fit:contain;display:block;">
        PTS Learning
      </a>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <a href="Login.html" style="padding:8px 14px;border:1px solid #974258;border-radius:999px;color:#974258;text-decoration:none;font-weight:700;font-size:14px;">เข้าสู่ระบบ</a>
        <a href="Register.html" style="padding:8px 14px;background:#974258;border-radius:999px;color:#fff;text-decoration:none;font-weight:700;font-size:14px;">สมัครสมาชิก</a>
      </div>
    </div>
  </nav>
</div>
<main class="pts-main" data-user-shell>
  <section class="pts-page-hero flex flex-col md:flex-row md:items-end md:justify-between gap-3">
    <div>
      <span class="pts-chip mb-3">Notifications</span>
      <h1 class="text-3xl md:text-4xl font-bold text-primary mb-2 pts-display">การแจ้งเตือน</h1>
      <p class="text-on-surface-variant">ข่าวสารและอัปเดตที่เกี่ยวข้องกับบัญชีของคุณ</p>
    </div>
    <button id="read-all" class="pts-btn pts-btn-outline">อ่านทั้งหมด</button>
  </section>
  <div id="list" class="space-y-3"></div>
</main>
<script>
const escapeHtml = (t) => String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
async function load() {
  const me = await fetch('/api/users/me', { credentials:'include' }).then(r=>r.json());
  if (!me.loggedIn) return location.href = 'Login.html';
  const res = await fetch('/api/notifications', { credentials:'include' });
  const data = await res.json();
  const box = document.getElementById('list');
  if (!res.ok || !data.success) {
    box.innerHTML = `<div class="pts-card p-5 text-error">${escapeHtml(data.message||'โหลดไม่สำเร็จ')}</div>`;
    return;
  }
  if (!data.data.length) {
    box.innerHTML = `<div class="pts-empty pts-card">ยังไม่มีการแจ้งเตือน</div>`;
    return;
  }
  box.innerHTML = data.data.map(n => `
    <article class="pts-card p-4 ${n.is_read ? 'opacity-70' : 'border-primary/30'}">
      <div class="flex justify-between gap-3">
        <div>
          <p class="font-bold">${escapeHtml(n.title)}</p>
          <p class="text-sm text-on-surface-variant mt-1">${escapeHtml(n.body||'')}</p>
          <p class="text-xs text-on-surface-variant mt-2">${new Date(n.created_at).toLocaleString('th-TH')}</p>
        </div>
        <div class="flex flex-col gap-2 items-end">
          ${n.link_url ? `<a class="pts-btn pts-btn-primary" href="${escapeHtml(n.link_url)}">เปิด</a>` : ''}
          ${n.is_read ? '' : `<button class="mark pts-btn pts-btn-ghost" data-id="${n.notification_id}">อ่านแล้ว</button>`}
        </div>
      </div>
    </article>`).join('');
}
document.getElementById('list').addEventListener('click', async (e) => {
  const btn = e.target.closest('.mark');
  if (!btn) return;
  await fetch(`/api/notifications/${btn.dataset.id}/read`, { method:'POST', credentials:'include' });
  load();
});
document.getElementById('read-all').onclick = async () => {
  await fetch('/api/notifications/read-all', { method:'POST', credentials:'include' });
  load();
};
load();
</script>
<!-- PTS-NAV-INLINE-BOOT -->
<script>

  var box = document.getElementById('app-navbar');
  if (!box) {
    box = document.createElement('div');
    box.id = 'app-navbar';
    if (document.body) document.body.insertBefore(box, document.body.firstChild);
  }
  if (box && !box.querySelector('nav')) {
    box.innerHTML = '<nav style="position:fixed;top:0;left:0;right:0;z-index:99999;height:68px;background:var(--pts-nav-bg,#fff);border-bottom:1px solid var(--pts-border,#eadfe2)">'
      + '<div style="max-width:1120px;margin:0 auto;height:100%;padding:0 16px;display:flex;align-items:center;justify-content:space-between">'
      + '<a href="Home.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--pts-text,#1c1520);font-weight:700">'
      + '<img src="https://lh3.googleusercontent.com/aida-public/AB6AXuABTNhK77NiL0IuFIQlI6OT3Vifm8qP13KVh2E7ow7C1nBZBzvCmxbfbPcqp_ufJqTB-yyShP5xCpLknrMb_L-Giu18pK_I31kIyaQ_R7QyIYjEwf6o5aRyjEY_AdnfLq2rmWtA8WnFI9-AaODwblGI-IcbELscflTPE3ViIRI0pz8sPdppAL4lmeCdpzCdbWVJVt8CsBOnK5aNpm5LSEzvcUIMq56MlbLb0noVVSeb7AcP1xu4117jog" alt="PTS Learning" style="height:42px;width:auto;max-width:160px;object-fit:contain;display:block">PTS Learning</a>'
      + '<div style="display:flex;gap:8px">'
      + '<a href="Login.html" style="padding:8px 14px;border:1px solid #974258;border-radius:999px;color:#974258;text-decoration:none;font-weight:700;font-size:14px">เข้าสู่ระบบ</a>'
      + '<a href="Register.html" style="padding:8px 14px;background:#974258;border-radius:999px;color:#fff;text-decoration:none;font-weight:700;font-size:14px">สมัครสมาชิก</a>'
      + '</div></div></nav>';
  }
})();
</script>
<script src="/comp/user-sidebar.js?v=20260724u"></script>
<script src="/comp/navbar.js?v=20260723d"></script>
</body>
</html>
