<script>
        // ไอคอนการกรอกข้อมูล Focus Interaction
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                const icon = input.parentElement.querySelector('span');
                if (icon) icon.classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                const icon = input.parentElement.querySelector('span');
                if (icon) icon.classList.remove('text-primary');
            });
        });

        // ฟังก์ชันเปิด-ปิดตา ดูรหัสผ่าน
        function togglePasswordVisibility(id) {
            const input = document.getElementById(id);
            const icon = document.getElementById(`${id}-icon`);
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        // ⚡ ระบบส่งข้อมูลเข้าฐานข้อมูลจริง (Connect with Node.js 后台)
        const form = document.querySelector('form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const tosChecked = document.getElementById('tos').checked;

            // 1. ตรวจสอบรหัสผ่านตรงกันไหม
            if (password !== confirmPassword) {
                alert('❌ ล้มเหลว: รหัสผ่านและการยืนยันรหัสผ่านไม่ตรงกัน กรุณาตรวจสอบอีกครั้ง');
                return;
            }

            // 2. ตรวจสอบการกดยอมรับเงื่อนไข
            if (!tosChecked) {
                alert('❌ กรุณากดเลือกยอมรับเงื่อนไขการใช้งานก่อนสมัครสมาชิก');
                return;
            }

            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = 'กำลังดำเนินการส่งข้อมูล...';
            btn.disabled = true;

            // มัดรวมข้อมูลส่งไป API
            const formData = {
                full_name: document.getElementById('fullname').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: password
            };

            try {
                // ยิงไปหาพอร์ต Node.js หลังบ้านที่เราตั้งค่าไว้
                const response = await fetch('http://localhost:3000/api/users/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();

                if (result.success) {
                    alert('✨ สำเร็จ: ' + result.message);
                    form.reset(); // ล้างฟอร์มเคลียร์ข้อมูลช่องกรอกทั้งหมด
                    window.location.href = 'Login.html'; // พากลับไปหน้าเข้าสู่ระบบเมื่อสำเร็จ
                } else {
                    alert('❌ ล้มเหลว: ' + result.message);
                }
            } catch (err) {
                console.error(err);
                alert('❌ เกิดข้อผิดพลาด: ไม่สามารถติดต่อระบบหลังบ้านได้ (ตรวจสอบว่ารัน node server.js อยู่หรือเปล่า)');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
