<script>
        // ไอคอนการกรอกข้อมูล Focus Interaction
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                const icon = input.parentElement.querySelector(':scope > span.material-symbols-outlined');
                if (icon) icon.classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                const icon = input.parentElement.querySelector(':scope > span.material-symbols-outlined');
                if (icon) icon.classList.remove('text-primary');
            });
        });

        // ⚡ ระบบส่งข้อมูลเข้าฐานข้อมูลจริง (Connect with Node.js 后台)
        const form = document.querySelector('form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const tosChecked = document.getElementById('tos').checked;
            const msgEl = document.getElementById('register-msg');
            const showMsg = (text) => {
                if (msgEl) { msgEl.textContent = text; msgEl.classList.remove('hidden'); }
                else console.error(text);
            };
            if (msgEl) { msgEl.textContent = ''; msgEl.classList.add('hidden'); }

            // 1. ตรวจสอบรหัสผ่านตรงกันไหม
            if (password !== confirmPassword) {
                showMsg('รหัสผ่านและการยืนยันรหัสผ่านไม่ตรงกัน กรุณาตรวจสอบอีกครั้ง');
                return;
            }

            // 2. ตรวจสอบการกดยอมรับเงื่อนไข
            if (!tosChecked) {
                showMsg('กรุณากดเลือกยอมรับเงื่อนไขการใช้งานก่อนสมัครสมาชิก');
                return;
            }

            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = 'กำลังดำเนินการส่งข้อมูล...';
            btn.disabled = true;

            // มัดรวมข้อมูลส่งไป API
            const formData = {
                full_name: document.getElementById('fullname').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: password
            };

            try {
                // ยิงไปหาพอร์ต Node.js หลังบ้านที่เราตั้งค่าไว้
                const response = await fetch('/api/users/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();

                if (result.success) {
                    window.location.href = 'Login.html';
                } else {
                    showMsg(result.message || 'สมัครสมาชิกไม่สำเร็จ');
                }
            } catch (err) {
                console.error(err);
                showMsg('ไม่สามารถติดต่อระบบหลังบ้านได้');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
