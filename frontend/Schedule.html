<main class="pts-main">
  <section class="pts-page-hero">
    <span class="pts-chip mb-3">My Schedule</span>
    <h1 class="text-3xl md:text-4xl font-bold text-primary mb-2 pts-display">ตารางเรียนของฉัน</h1>
    <p class="text-on-surface-variant max-w-xl">คลาสที่กำลังจะถึงจากคอร์สที่คุณสมัครไว้เท่านั้น — คลาส Onsite ให้ใช้ QR จากอีเมลด้านล่าง</p>
    <div id="gcal-bar" class="mt-4 flex flex-wrap items-center gap-2 hidden">
      <a id="gcal-connect" class="pts-btn pts-btn-primary hidden" href="#">เชื่อม Google Calendar</a>
      <button id="gcal-sync" type="button" class="pts-btn pts-btn-outline hidden">ซิงค์ไปยังปฏิทิน</button>
      <a class="pts-btn pts-btn-outline" href="Settings.html">ตั้งค่าปฏิทิน</a>
      <span id="gcal-note" class="text-sm text-on-surface-variant"></span>
    </div>
  </section>
  <div id="schedule-attendance-qr" class="pts-attend-qr-panel"></div>

    <div class="pts-empty">กำลังโหลดตาราง...</div>
  </div>
</main>
<div class="pts-footer-note">© PTS Learning</div>
<script>
const escapeHtml = (t) => String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

async function loadGcalBar() {
  const bar = document.getElementById('gcal-bar');
  const connectBtn = document.getElementById('gcal-connect');
  const syncBtn = document.getElementById('gcal-sync');
  const note = document.getElementById('gcal-note');
  try {
    const st = await fetch('/api/google/status', { credentials: 'include' }).then(r => r.json());
    if (!st.configured) {
      bar.classList.add('hidden');
      return;
    }
    bar.classList.remove('hidden');
    if (st.connected) {
      connectBtn.classList.add('hidden');
      syncBtn.classList.remove('hidden');
      note.textContent = st.google_email
        ? `เชื่อมแล้ว: ${st.google_email} (แจ้งเตือนล่วงหน้า 1 วัน / 1 ชม.)`
        : 'เชื่อม Google Calendar แล้ว — กดซิงค์เพื่ออัปเดต';
    } else {
      connectBtn.classList.remove('hidden');
      syncBtn.classList.add('hidden');
      note.textContent = 'เชื่อมปฏิทินเพื่อรับการแจ้งเตือนก่อนวันเรียน';
    }
  } catch (_) {
    bar.classList.add('hidden');
  }
}

document.getElementById('gcal-sync').onclick = async () => {
  const btn = document.getElementById('gcal-sync');
  const note = document.getElementById('gcal-note');
  btn.disabled = true;
  btn.textContent = 'กำลังซิงค์...';
  try {
    const res = await fetch('/api/google/sync', { method: 'POST', credentials: 'include' });
    const data = await res.json();
    note.textContent = data.message || (res.ok ? 'ซิงค์แล้ว' : 'ซิงค์ไม่สำเร็จ');
  } catch (e) {
    note.textContent = e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'ซิงค์ไปยังปฏิทิน';
  }
};

document.getElementById('gcal-connect').onclick = async (e) => {
  e.preventDefault();
  const note = document.getElementById('gcal-note');
  const btn = document.getElementById('gcal-connect');
  btn.textContent = 'กำลังเปิด Google...';
  try {
    const res = await fetch('/api/google/oauth/start?redirect=0', {
      credentials: 'include',
      headers: { Accept: 'application/json' }
    });
    const data = await res.json();
    if (!res.ok || !data.url) throw new Error(data.message || 'เริ่มเชื่อมต่อไม่สำเร็จ');
    window.location.href = data.url;
  } catch (err) {
    note.textContent = err.message;
    btn.textContent = 'เชื่อม Google Calendar';
  }
};

async function load() {
  const me = await fetch('/api/users/me', { credentials: 'include' }).then(r => r.json());
  if (!me.loggedIn) return location.href = 'Login.html';
  if (window.PtsAttendanceQr && me.user && me.user.email) {
    window.PtsAttendanceQr.mount('#schedule-attendance-qr', {
      email: me.user.email,
      name: me.user.name || ''
    });
  }
  await loadGcalBar();
  const res = await fetch('/api/my/schedules', { credentials: 'include' });
  const data = await res.json();
  const el = document.getElementById('schedule-list');
  if (!res.ok || !data.success) {
    el.innerHTML = `<div class="pts-empty pts-msg--err">${escapeHtml(data.message || 'โหลดไม่สำเร็จ')}</div>`;
    return;
  }
  if (!data.data.length) {
    el.innerHTML = `<div class="pts-empty">
      <div class="pts-empty__icon"><span class="material-symbols-outlined">event_busy</span></div>
      <p class="font-semibold mb-1">ยังไม่มีตารางเรียน</p>
      <p class="text-sm mb-4">เมื่อสมัครคอร์สที่มีตาราง จะแสดงที่นี่</p>
      <a class="pts-btn pts-btn-primary" href="Courses.html">ดูหลักสูตร</a>
    </div>`;
    return;
  }
  el.innerHTML = data.data.map(s => {
    const d = new Date(s.start_at);
    const month = d.toLocaleDateString('th-TH', { month: 'short' });
    const day = d.getDate();
    const time = d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
    const end = new Date(s.end_at).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
    return `<article class="pts-row">
      <div class="flex items-start gap-4">
        <div class="pts-date-badge"><span class="text-xs font-bold uppercase">${escapeHtml(month)}</span><strong>${day}</strong></div>
        <div>
          <span class="pts-chip mb-2">${escapeHtml(s.delivery_mode || 'online')}</span>
          <h2 class="font-bold text-lg mt-1">${escapeHtml(s.title)}</h2>
          <p class="text-sm text-on-surface-variant mt-1">${escapeHtml(s.course_name || '')} · ${escapeHtml(time)}–${escapeHtml(end)}</p>
          <p class="text-sm text-on-surface-variant">${escapeHtml(s.location || 'ออนไลน์')}</p>
        </div>
      </div>
      ${s.meeting_url
        ? `<a href="${escapeHtml(s.meeting_url)}" target="_blank" rel="noopener" class="pts-btn pts-btn-primary">เข้าห้องเรียน</a>`
        : `<span class="text-sm text-on-surface-variant">รอประกาศลิงก์</span>`}
    </article>`;
  }).join('');
}
load().catch(err => {
  document.getElementById('schedule-list').innerHTML = `<div class="pts-empty pts-msg--err">${escapeHtml(err.message)}</div>`;
});
</script>
