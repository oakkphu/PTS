<main class="pts-main" style="max-width:720px">
  <section class="pts-page-hero">
    <span class="pts-chip mb-3">Account</span>
    <h1 class="text-3xl md:text-4xl font-bold text-primary mb-2 pts-display">ตั้งค่าบัญชี</h1>
    <p class="text-on-surface-variant">จัดการโปรไฟล์และรหัสผ่านของคุณ</p>
  </section>

  <section class="pts-panel mb-5">
    <h2 class="font-bold text-lg mb-4">โปรไฟล์</h2>
    <label class="pts-field"><span>ชื่อ-นามสกุล</span><input id="full_name" class="pts-input"></label>
    <label class="pts-field"><span>อีเมล</span><input id="email" disabled class="pts-input"></label>
    <label class="pts-field"><span>เบอร์โทร</span><input id="phone" class="pts-input"></label>
    <label class="pts-field"><span>URL รูปโปรไฟล์</span><input id="url" class="pts-input" placeholder="https://..."></label>
    <button id="save-profile" class="pts-btn pts-btn-primary">บันทึกโปรไฟล์</button>
    <p id="profile-msg" class="pts-msg"></p>
  </section>

  <section class="pts-panel">
    <h2 class="font-bold text-lg mb-2">เปลี่ยนรหัสผ่าน</h2>
    <p class="text-sm text-on-surface-variant mb-4">ระบบส่ง OTP ไปที่อีเมลบัญชีเพื่อยืนยันก่อนเปลี่ยนรหัสผ่าน</p>
    <label class="pts-field"><span>รหัสผ่านปัจจุบัน</span>
      <div class="pts-pw-wrap relative">
        <input id="current_password" type="password" class="pts-input pts-pw-input" data-pts-pw-field="1">
        <button type="button" class="pts-pw-toggle hidden" data-pts-pw-toggle="1" aria-label="แสดงหรือซ่อนรหัสผ่าน"><span class="material-symbols-outlined" aria-hidden="true">visibility</span></button>
      </div>
    </label>
    <label class="pts-field"><span>รหัสผ่านใหม่</span>
      <div class="pts-pw-wrap relative">
        <input id="new_password" type="password" class="pts-input pts-pw-input" data-pts-pw-field="1">
        <button type="button" class="pts-pw-toggle hidden" data-pts-pw-toggle="1" aria-label="แสดงหรือซ่อนรหัสผ่าน"><span class="material-symbols-outlined" aria-hidden="true">visibility</span></button>
      </div>
    </label>
    <div class="flex flex-col sm:flex-row gap-3 items-stretch sm:items-end mb-3">
      <label class="pts-field flex-1 mb-0"><span>รหัส OTP จากอีเมล</span>
        <input id="password_otp" type="text" maxlength="6" inputmode="numeric" class="pts-input text-center tracking-[0.3em] font-bold" placeholder="••••••">
      </label>
      <button id="request-password-otp" type="button" class="pts-btn pts-btn-outline whitespace-nowrap">ส่ง OTP ไปอีเมล</button>
    </div>
    <button id="save-password" class="pts-btn pts-btn-primary">ยืนยันเปลี่ยนรหัสผ่าน</button>
    <p id="password-msg" class="pts-msg"></p>
  </section>
</main>
<div class="pts-footer-note">© PTS Learning</div>
<script>
(async () => {
  const me = await fetch('/api/users/me', { credentials: 'include' }).then(r => r.json());
  if (!me.loggedIn) return location.href = 'Login.html';
  const profile = await fetch('/api/profile', { credentials: 'include' }).then(r => r.json());
  if (!profile.success) { console.error(profile.message || 'โหลดโปรไฟล์ไม่สำเร็จ'); return location.href = 'Login.html'; }
  document.getElementById('full_name').value = profile.data.full_name || '';
  document.getElementById('email').value = profile.data.email || '';
  document.getElementById('phone').value = profile.data.phone || '';
  document.getElementById('url').value = profile.data.Url || '';
})();

document.getElementById('save-profile').onclick = async () => {
  const res = await fetch('/api/profile', {
    method: 'PUT', credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      full_name: document.getElementById('full_name').value,
      phone: document.getElementById('phone').value,
      url: document.getElementById('url').value
    })
  });
  const data = await res.json();
  const msg = document.getElementById('profile-msg');
  msg.textContent = data.message || '';
  msg.className = res.ok ? 'pts-msg pts-msg--ok' : 'pts-msg pts-msg--err';
};

document.getElementById('request-password-otp').onclick = async () => {
  const btn = document.getElementById('request-password-otp');
  const msg = document.getElementById('password-msg');
  btn.disabled = true;
  btn.textContent = 'กำลังส่ง...';
  try {
    const res = await fetch('/api/profile/password/request-otp', { method: 'POST', credentials: 'include' });
    const data = await res.json();
    msg.textContent = data.message || '';
    msg.className = res.ok ? 'pts-msg pts-msg--ok' : 'pts-msg pts-msg--err';
  } catch (e) {
    msg.textContent = e.message;
    msg.className = 'pts-msg pts-msg--err';
  } finally {
    btn.disabled = false;
    btn.textContent = 'ส่ง OTP ไปอีเมล';
  }
};

document.getElementById('save-password').onclick = async () => {
  const res = await fetch('/api/profile/password', {
    method: 'PUT', credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      current_password: document.getElementById('current_password').value,
      new_password: document.getElementById('new_password').value,
      otp: document.getElementById('password_otp').value
    })
  });
  const data = await res.json();
  const msg = document.getElementById('password-msg');
  msg.textContent = data.message || '';
  msg.className = res.ok ? 'pts-msg pts-msg--ok' : 'pts-msg pts-msg--err';
  if (res.ok) {
    document.getElementById('current_password').value = '';
    document.getElementById('new_password').value = '';
    document.getElementById('password_otp').value = '';
  }
};
</script>
