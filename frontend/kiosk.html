<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>ตู้ Kiosk เช็กอิน Onsite | PTS Learning</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; background: #eceff1; padding: 20px; }
        .kiosk-box { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; }
        .result { margin-top: 15px; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; display: none; }
        .success { background: #d4edda; color: #155724; display: block; }
        .error { background: #f8d7da; color: #721c24; display: block; }
        code { background: #f1f3f5; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    </style>
</head>
<body>

<div class="kiosk-box">
    <p style="background:#fff3cd;color:#856404;padding:10px;border-radius:8px;margin-bottom:12px;font-size:14px;text-align:left;line-height:1.5;">
        ตัวจำลองสำหรับทดสอบ API เท่านั้น — ใช้งานจริงใช้เครื่อง Kiosk<br>
        สแกน <strong>QR จากอีเมลผู้เรียน</strong> (หน้าแดชบอร์ด / ตารางเรียน)<br>
        แล้วเรียก <code>POST /api/attendance/scan</code> ด้วยค่าอีเมลใน QR
    </p>
    <h2>เช็กอินคลาส Onsite</h2>
    <p style="color:#546e7a;font-size:14px;margin-top:0;">สแกน QR ของผู้เรียนเพื่อบันทึกเข้า/ออก</p>
    <div id="reader"></div>
    <div id="scan-result" class="result"></div>
</div>

<script>
    const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    html5QrcodeScanner.render(onScanSuccess);

    async function onScanSuccess(decodedText) {
        // decodedText = อีเมลใน QR ของผู้เรียน
        const resultDiv = document.getElementById('scan-result');
        const email = String(decodedText || '').trim();
        
        try {
            const response = await fetch('/api/attendance/scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    employee_id: email,
                    kiosk_device_id: 'KIOSK_MAIN_CAMERA'
                })
            });
            const resData = await response.json();

            if (resData.success) {
                resultDiv.className = "result success";
                resultDiv.innerHTML = `บันทึกสำเร็จ<br>
                                       คุณ: ${resData.data.employee_name}<br>
                                       อีเมล: ${resData.data.employee_code} (${resData.data.department})<br>
                                       เวลา: ${resData.data.scan_time} [${resData.data.scan_type}]<br>
                                       สถานะ: ${resData.data.status}`;
            } else {
                resultDiv.className = "result error";
                resultDiv.innerHTML = `ล้มเหลว: ${resData.message}`;
            }
        } catch (err) {
            resultDiv.className = "result error";
            resultDiv.innerHTML = "ไม่สามารถติดต่อเซิร์ฟเวอร์หลังบ้านได้";
        }
    }
</script>
</body>
</html>
